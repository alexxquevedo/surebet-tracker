app = "fidesbot"
primary_region = "mad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  # El bot no expone puerto web, desactivamos el health check
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
